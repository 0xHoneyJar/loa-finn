# grimoires/loa/ground-truth/contracts.yaml — Machine-Consumable GT Invariants
#
# Schema design informed by hounfour ConstraintFile (v8.3.1):
#   hounfour: { $schema, schema_id, origin, contract_version, expression_version, constraints[] }
#   GT:       { version, commit, hounfour_version, domains[].invariants[] }
#
# Mapping table (hounfour → GT):
#   id                  → invariants[].id           (INV-1, INV-2, etc.)
#   expression          → invariants[].statement    (human-readable; not DSL-evaluable)
#   severity            → invariants[].severity     (always "error" for conservation laws)
#   message             → invariants[].failure.detection
#   fields              → invariants[].source.file + enforcement.file
#   native_enforcement  → invariants[].enforcement  (function, lines)
#   evaluation_geometry → N/A (GT invariants are structural, not expression-evaluable)
#   condition           → N/A (no feature-flag gating for GT invariants)
#
# All claims grounded in codebase at the commit below.
# Bidirectional traceability: each `id` matches the markdown heading anchor in contracts.md.

