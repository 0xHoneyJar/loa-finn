# .github/workflows/e2e-v2.yml — ES256 + Freeside E2E test pipeline (Cycle-035 Sprint 1 T1.8)
# Builds finn + redis + freeside, generates ES256 keypair, runs full E2E suite.

name: E2E v2 Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check GHCR token
        id: check-token
        run: |
          if [ -n "${{ secrets.ARRAKIS_CHECKOUT_TOKEN }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::ARRAKIS_CHECKOUT_TOKEN not available — skipping e2e-v2 (GHCR login required)"
          fi

      - name: Login to GHCR
        if: steps.check-token.outputs.available == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ARRAKIS_CHECKOUT_TOKEN }}

      - name: Setup Node.js
        if: steps.check-token.outputs.available == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install pnpm
        if: steps.check-token.outputs.available == 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        if: steps.check-token.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate ES256 keypair
        if: steps.check-token.outputs.available == 'true'
        run: npx tsx tests/e2e/generate-keys.ts

      - name: Start E2E compose stack
        if: steps.check-token.outputs.available == 'true'
        run: docker compose -f tests/e2e/docker-compose.e2e-v2.yml up -d --build

      - name: Wait for services to be healthy
        if: steps.check-token.outputs.available == 'true'
        run: ./tests/e2e/wait-healthy.sh

      - name: Run E2E tests
        if: steps.check-token.outputs.available == 'true'
        run: pnpm vitest run tests/e2e/ --reporter=default --reporter=junit --outputFile=test-results/e2e-v2-results.xml

      - name: Upload test results
        if: always() && steps.check-token.outputs.available == 'true'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: e2e-v2-test-results
          path: test-results/e2e-v2-results.xml
          retention-days: 14

      - name: Collect logs on failure
        if: failure() && steps.check-token.outputs.available == 'true'
        run: docker compose -f tests/e2e/docker-compose.e2e-v2.yml logs --no-color > e2e-v2-logs.txt

      - name: Upload logs artifact
        if: failure() && steps.check-token.outputs.available == 'true'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: e2e-v2-logs
          path: e2e-v2-logs.txt
          retention-days: 7

      - name: Tear down compose stack
        if: always() && steps.check-token.outputs.available == 'true'
        run: docker compose -f tests/e2e/docker-compose.e2e-v2.yml down -v
