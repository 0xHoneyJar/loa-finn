name: Three-Service E2E

on:
  workflow_dispatch:
    inputs:
      finn_url:
        description: 'Finn base URL'
        required: true
        default: 'http://localhost:3001'
      freeside_url:
        description: 'Freeside base URL'
        required: true
      dixie_url:
        description: 'Dixie base URL'
        required: true

permissions:
  contents: read

jobs:
  three-service-e2e:
    name: Finn/Freeside/Dixie E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run configured three-service E2E
        env:
          E2E_FINN_URL: ${{ inputs.finn_url }}
          E2E_FREESIDE_URL: ${{ inputs.freeside_url }}
          E2E_DIXIE_URL: ${{ inputs.dixie_url }}
        run: pnpm run test:e2e
